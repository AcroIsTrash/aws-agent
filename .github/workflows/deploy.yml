name: Build and push agent image

# Runs automatically on merge to main (Step 6), and stays manually runnable
# via workflow_dispatch for re-runs/testing. The deploy job is gated behind the
# build job (needs:), so a broken build never reaches the instance.
on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC role assumption needs id-token: write. contents: read is least-privilege
# for checkout. No long-lived AWS keys in the repo (see Step 2 decision).
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: aws-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Tag by commit SHA only — the ECR repo is IMMUTABLE, so there is no
      # moving :latest to overwrite. The SHA tag is the rollback/trace handle.
      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  # Step 5: tell the running instance to pull the image just pushed.
  # SSM Run Command — no inbound SSH, no stored SSH key (see Step 2/0 decisions).
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Pull the exact SHA image, then locally re-tag it aws-agent:latest so the
      # operator can `docker run aws-agent` without knowing the SHA. The registry
      # stays immutable; only this box's local tag moves.
      - name: Deploy to EC2 via SSM Run Command
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com"
          REPO="$REGISTRY/$ECR_REPOSITORY"

          cat > ssm-params.json <<JSON
          {
            "commands": [
              "set -e",
              "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY",
              "docker pull $REPO:$IMAGE_TAG",
              "docker tag $REPO:$IMAGE_TAG aws-agent:latest",
              "docker image prune -f"
            ]
          }
          JSON

          command_id=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy aws-agent $IMAGE_TAG" \
            --parameters file://ssm-params.json \
            --query "Command.CommandId" --output text)
          echo "Sent SSM command $command_id — waiting for completion..."

          aws ssm wait command-executed \
            --command-id "$command_id" --instance-id "$INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$command_id" --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json

          status=$(aws ssm get-command-invocation \
            --command-id "$command_id" --instance-id "$INSTANCE_ID" \
            --query Status --output text)
          echo "SSM command status: $status"
          [ "$status" = "Success" ]
