name: Build and push agent image

# Step 4 scope: build the image and push it to ECR.
# Manual trigger for now so it's testable in isolation; Step 6 adds the
# push-to-main trigger, and Step 5 appends the deploy job.
on:
  workflow_dispatch:

# OIDC role assumption needs id-token: write. contents: read is least-privilege
# for checkout. No long-lived AWS keys in the repo (see Step 2 decision).
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: aws-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Tag by commit SHA only — the ECR repo is IMMUTABLE, so there is no
      # moving :latest to overwrite. The SHA tag is the rollback/trace handle.
      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
