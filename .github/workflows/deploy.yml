# Layer 3, Step 3: CI/CD pipeline.
#
# Runs on every push to main. On GitHub's runner it: assumes the Step 2 IAM role
# via OIDC (no stored keys), builds the image, pushes it to ECR, then tells the
# EC2 box (via SSM) to pull the new image. GitHub builds -> ECR stores -> EC2 pulls.
name: Deploy

on:
  push:
    branches: [master]

# OIDC requires id-token:write so the runner can mint its token.
# contents:read is for the checkout. Nothing more is granted.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: aws-agent

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Mint the OIDC token and assume the Step 2 role. The ARN is not a secret.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::854970834208:role/aws-agent-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Tag by git SHA: the repo is IMMUTABLE, so there is no moving :latest.
      # Every running image traces back to an exact commit; rollback = deploy an
      # older SHA.
      - name: Build, tag (by SHA), and push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$SHA" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$SHA"
          echo "IMAGE_TAG=$SHA" >> "$GITHUB_ENV"
          echo "REGISTRY=$REGISTRY" >> "$GITHUB_ENV"

      # Tell the box (matched by tag Name=aws-agent) to pull the new image, then
      # WAIT for the SSM command and fail the job if the deploy didn't succeed.
      # `set -e` on the box (which runs the command under /bin/sh, so no
      # pipefail) ensures a failed login/pull is a real failure, not masked by
      # the trailing prune. If no instance is running
      # (EC2 intentionally off), there are no invocations and we skip cleanly.
      - name: Deploy to EC2 via SSM
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          CMD_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Name,Values=aws-agent" \
            --comment "Deploy $IMAGE_TAG" \
            --parameters commands="[\
              \"set -e\",\
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY\",\
              \"docker pull $IMAGE\",\
              \"docker image prune -f\"]" \
            --query "Command.CommandId" --output text)
          echo "SSM CommandId: $CMD_ID"

          # Targeting is async; give invocations a chance to register.
          INSTANCES=""
          for _ in $(seq 1 6); do
            INSTANCES=$(aws ssm list-command-invocations --command-id "$CMD_ID" \
              --query "CommandInvocations[].InstanceId" --output text)
            [ -n "$INSTANCES" ] && break
            sleep 5
          done

          if [ -z "$INSTANCES" ]; then
            echo "No running instance tagged Name=aws-agent — nothing to deploy to. Skipping."
            exit 0
          fi

          rc=0
          for i in $INSTANCES; do
            echo "Waiting for deploy on $i ..."
            status=InProgress
            for _ in $(seq 1 30); do
              status=$(aws ssm get-command-invocation --command-id "$CMD_ID" \
                --instance-id "$i" --query "Status" --output text)
              case "$status" in
                Success) echo "  $i: Success"; break ;;
                Failed|Cancelled|TimedOut) break ;;
                *) sleep 10 ;;
              esac
            done
            if [ "$status" != "Success" ]; then
              rc=1
              echo "::error::Deploy to $i ended in status: $status"
              aws ssm get-command-invocation --command-id "$CMD_ID" \
                --instance-id "$i" --query "StandardErrorContent" --output text
            fi
          done
          exit $rc
